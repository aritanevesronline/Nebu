<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Nebu Birthday!</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="/styles/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/jpg" href="images/IconWindows.png" />
    <script src="js/sparkle.js" type="text/javascript"></script>
    <script src="js/slide.js" type="text/javascript"></script>

</head>

<body>
    <div class="bg">
        <div class="z-3">
            <div class="tile top-left animate-opacity freq-5"></div>
            <div class="tile top-right animate-opacity freq-9"></div>
            <div class="tile bottom-left animate-opacity freq-7"></div>
            <div class="tile bottom-right animate-opacity freq-10"></div>
        </div>
        <div class="z-2">
            <div class="tile top-left animate-opacity freq-9 delay-2"></div>
            <div class="tile top-right animate-opacity freq-5 delay-2"></div>
            <div class="tile bottom-left animate-opacity freq-6 delay-4"></div>
            <div class="tile bottom-right animate-opacity freq-10 delay-4"></div>
        </div>
        <div class="z-1">
            <div class="tile top-left animate-opacity freq-7 delay-2"></div>
            <div class="tile top-right animate-opacity freq-5 delay-4"></div>
            <div class="tile bottom-left animate-opacity freq-9 delay-2"></div>
            <div class="tile bottom-right animate-opacity freq-5 delay"></div>
        </div>
    </div>
    <div class="container">
        <h1 class="text active">Hey Pooks!!</h1>
        <h1 class="text">It's finally your birthday!!</h1>
        <h1 class="text">
            Even though you said you didn't want a present…
            we decided to make you a little something anyway.
        </h1>
        <h1 class="text last">
            It's just a small reminder that in this vast universe,
            every star shining tonight is someone who loves you ✨
        </h1>

        <div class="sky">
            <h1 class="skytext">Click the stars~♡</h1>

            <div class="star" style="top: 40%; left: 20%;"
                onclick="openMessage('Dimitris', 'Just checking\nhow many\nline\nbreaks\ncan\nthis\ntake')">
            </div>

            <div class="star" style="top: 50%; left: 22%;" onclick="openMessage('Nutty', 'Text 2')">
            </div>

            <div class="star" style="top: 36%; left: 45%;" onclick="openMessage('Apo', 'Text 3')">
            </div>

            <div class="star" style="top: 60%; left: 80%;" onclick="openMessage('Harry', 'Text 4')">
            </div>

            <div class="star" style="top: 30%; left: 70%;" onclick="openMessage('Bubu', 'Text 5')">
            </div>

            <div class="star" style="top: 70%; left: 20%;" onclick="openMessage('Mika', 'Text 6')">
            </div>

            <div class="star" style="top: 77%; left: 16%;" onclick="openMessage('Leah', 'Text 7')">
            </div>

            <div class="star" style="top: 84%; left: 12%;" onclick="openMessage('Rita', 'Text 8')">
            </div>
        </div>

        <div class="modal" id="modal">
            <div class="modal-content">
                <h2 id="name"></h2>
                <p id="text"></p>
                <div class="close" onclick="closeMessage()">close ✨</div>
            </div>
        </div>
        <script>
            function openMessage(name, text) {
                document.getElementById('name').innerText = name;
                document.getElementById('text').innerText = text;
                document.getElementById('modal').style.display = 'flex';
            }

            function closeMessage() {
                document.getElementById('modal').style.display = 'none';
            }
        </script>

        <script>
            document.addEventListener("DOMContentLoaded", function () {

                const texts = document.querySelectorAll('.text');
                const last = document.querySelector('.last');
                const sky = document.querySelector('.sky');
                let currentIndex = 0;

                document.addEventListener('click', function (e) {

                    if (currentIndex < texts.length - 1) {
                        const currentText = texts[currentIndex];
                        currentText.classList.remove('active');

                        const handler = () => {
                            currentIndex++;
                            texts[currentIndex].classList.add('active');
                            currentText.removeEventListener('transitionend', handler);
                        };
                        currentText.addEventListener('transitionend', handler);
                    }
                    else if (currentIndex === texts.length - 1) {
                        last.classList.remove('active');
                        const handler = () => {
                            last.style.display = 'none';
                            sky.style.display = 'flex';
                            // Trigger fade-in
                            requestAnimationFrame(() => {
                                sky.classList.add('show');
                            });
                            last.removeEventListener('transitionend', handler);
                        };
                        last.addEventListener('transitionend', handler);

                        currentIndex++;
                    }

                });

            });
        </script>
    </div>

</body>
<script src="/js/index.js"></script>

</html>
